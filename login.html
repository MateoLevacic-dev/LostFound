<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijava - Lost & Found Croatia</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-Tn+5R5p2Bm33K8SFOKPWKwF8r8r1pN7+tYhdGWAqPqQxBuG6zI6M3ehAz3pX8pP1A+HeF2bB+zVZOkT1vX4qYw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body data-page="login">
  <header class="site-header glass-card">
    <a href="index.html" class="brand"><i class="fas fa-compass"></i>Lost & Found Croatia</a>
    <nav class="main-nav"><a href="index.html">Početna</a><a href="register.html">Registracija</a></nav>
  </header>

  <main class="auth-page">
    <section class="auth-panel glass-card">
      <div class="auth-hero">
        <h2>Prijavite se</h2>
        <p>Dobrodošli natrag. Nastavite sa svojim računom kako biste objavili ili pratili predmete.</p>
      </div>
      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email ili korisničko ime</label>
          <input type="text" id="login-email" name="email" placeholder="ime@primjer.com ili korisničko ime" required />
        </div>
        <div class="form-group">
          <label for="login-password">Lozinka</label>
          <input type="password" id="login-password" name="password" placeholder="********" required minlength="6" />
        </div>
        <div class="form-options">
          <label class="checkbox-inline"><input type="checkbox" id="remember-me" /> Zapamti me</label>
          <a href="#">Zaboravili ste lozinku?</a>
        </div>
        <button type="submit" class="button">Prijavi se</button>
        <p class="small-note">Nemate račun? <a href="register.html">Registrirajte se</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer compact">
    <p>© 2026 Lost & Found Croatia</p>
  </footer>

  <button class="scroll-top" aria-label="Vrati se gore"><i class="fas fa-chevron-up"></i></button>
  <script type="module" src="js/app.js"></script>
</body>
</html>
