<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registracija - Lost & Found Croatia</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-Tn+5R5p2Bm33K8SFOKPWKwF8r8r1pN7+tYhdGWAqPqQxBuG6zI6M3ehAz3pX8pP1A+HeF2bB+zVZOkT1vX4qYw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body data-page="register">
  <header class="site-header glass-card">
    <a href="index.html" class="brand"><i class="fas fa-compass"></i>Lost & Found Croatia</a>
    <nav class="main-nav"><a href="index.html">Početna</a><a href="login.html">Prijava</a></nav>
  </header>

  <main class="auth-page">
    <section class="auth-panel glass-card">
      <div class="auth-hero">
        <h2>Kreirajte račun</h2>
        <p>Pridružite se zajednici i počnite pratiti, objavljivati ili vraćati predmete.</p>
      </div>
      <form id="register-form" class="auth-form" novalidate>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="first-name">Ime</label>
            <input type="text" id="first-name" name="firstName" placeholder="Marko" required />
          </div>
          <div class="form-group">
            <label for="last-name">Prezime</label>
            <input type="text" id="last-name" name="lastName" placeholder="Horvat" required />
          </div>
        </div>
        <div class="form-group">
          <label for="username">Korisničko ime</label>
          <input type="text" id="username" name="username" placeholder="marko123" required minlength="3" />
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" name="email" placeholder="ime@primjer.com" required />
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="register-password">Lozinka</label>
            <input type="password" id="register-password" name="password" placeholder="********" required minlength="6" />
          </div>
          <div class="form-group">
            <label for="confirm-password">Potvrda lozinke</label>
            <input type="password" id="confirm-password" name="confirmPassword" placeholder="Ponovno unesite lozinku" required minlength="6" />
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="phone">Broj mobitela</label>
            <input type="tel" id="phone" name="phone" placeholder="091 123 4567" required />
          </div>
          <div class="form-group">
            <label for="city">Grad</label>
            <input type="text" id="city" name="city" placeholder="Zagreb" required />
          </div>
        </div>
        <div class="form-group">
          <label for="avatar">Avatar (URL)</label>
          <input type="url" id="avatar" name="avatar" placeholder="https://..." />
        </div>
        <label class="checkbox-inline"><input type="checkbox" id="terms" name="terms" required /> Prihvaćam uvjete korištenja.</label>
        <button type="submit" class="button">Registriraj se</button>
        <p class="small-note">Već imate račun? <a href="login.html">Prijavite se</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer compact">
    <p>© 2026 Lost & Found Croatia</p>
  </footer>

  <button class="scroll-top" aria-label="Vrati se gore"><i class="fas fa-chevron-up"></i></button>
  <script type="module" src="js/app.js"></script>
</body>
</html>
