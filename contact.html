<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt - Lost & Found Croatia</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-Tn+5R5p2Bm33K8SFOKPWKwF8r8r1pN7+tYhdGWAqPqQxBuG6zI6M3ehAz3pX8pP1A+HeF2bB+zVZOkT1vX4qYw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body data-page="contact">
  <header class="site-header glass-card">
    <div class="brand"><i class="fas fa-compass"></i>Lost & Found Croatia</div>
    <nav class="main-nav"><a href="index.html">Početna</a><a href="lost-items.html">Izgubljeno</a><a href="found-items.html">Pronađeno</a><a href="dashboard.html">Upravljačka ploča</a><a href="profile.html">Profil</a></nav>
    <div class="header-actions"><button class="theme-toggle" aria-label="Promijeni temu"><i class="fas fa-moon"></i></button></div>
  </header>

  <main class="page-section contact-page glass-card">
    <section class="section-header">
      <p class="section-tag">Kontakt</p>
      <h3>Imate pitanje? Javite nam se</h3>
    </section>

    <div class="contact-grid">
      <div class="contact-card glass-card">
        <h4>Centar za podršku</h4>
        <p>Naš tim je dostupan za sve upite vezane uz prijavu i povratak predmeta.</p>
        <ul>
          <li><i class="fas fa-envelope"></i> podrska@lostfound.hr</li>
          <li><i class="fas fa-phone"></i> +385 91 123 4567</li>
          <li><i class="fas fa-map-marker-alt"></i> Zagreb, Hrvatska</li>
        </ul>
      </div>
      <div class="contact-card glass-card">
        <h4>Pošaljite poruku</h4>
        <form id="contact-form" class="contact-form" novalidate>
          <div class="form-group">
            <label for="contact-name">Ime</label>
            <input type="text" id="contact-name" required />
          </div>
          <div class="form-group">
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" required />
          </div>
          <div class="form-group">
            <label for="contact-message">Poruka</label>
            <textarea id="contact-message" rows="5" required></textarea>
          </div>
          <button type="submit" class="button">Pošalji poruku</button>
        </form>
      </div>
    </div>
  </main>

  <button class="scroll-top" aria-label="Vrati se gore"><i class="fas fa-chevron-up"></i></button>
  <script type="module" src="js/app.js"></script>
</body>
</html>
